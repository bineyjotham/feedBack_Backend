global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'feedback-api-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'feedback-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['feedback-api:80']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'feedback-api-otel'
    metrics_path: '/scrape'
    static_configs:
      - targets: ['feedback-api:80']
    scrape_interval: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'sqlserver'
    static_configs:
      - targets: ['sqlserver:1434']