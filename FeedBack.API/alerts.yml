groups:
  - name: feedback_api_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(api_requests_total{status_code="500"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, rate(api_request_duration_milliseconds_bucket[5m])) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API responses detected"
          description: "95th percentile response time is {{ $value }}ms"

      - alert: HighRateLimitHits
        expr: rate(ratelimit_hits_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hits detected"
          description: "Rate limit being hit {{ $value }} times per second"

      - alert: LargeEmailQueue
        expr: email_queue_size > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Email queue backlog detected"
          description: "Email queue size is {{ $value }}"

      - alert: HighDatabaseLatency
        expr: histogram_quantile(0.95, rate(database_query_duration_milliseconds_bucket[5m])) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database latency detected"
          description: "95th percentile database query time is {{ $value }}ms"

      - alert: LowFeedbackVolume
        expr: rate(feedback_submitted_total[30m]) < 1
        for: 2h
        labels:
          severity: info
        annotations:
          summary: "Low feedback volume"
          description: "No feedback submissions in the last 2 hours"