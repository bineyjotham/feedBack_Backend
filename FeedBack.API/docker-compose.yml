services:
  feedback-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      DB_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: "Express"
    # ports:
    #   - "1434:1433"
    volumes:
      - feedback-db_data:/var/opt/mssql
    networks:
      - feedback_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "${DB_USER}", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 5s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - feedback_network

  feedback-api:
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.feedback-backend.rule=Host(`api.xdsdataghana.cloud`)
      - traefik.http.routers.feedback-backend.entrypoints=websecure
      - traefik.http.routers.feedback-backend.tls.certresolver=letsencrypt
      - traefik.http.services.feedback-backend.loadbalancer.server.port=8080
    environment:
      - ConnectionStrings__DefaultConnection=Server=feedback-db;Database=FeedbackDB;User ID=${DB_USER};Password=${DB_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=true
      - ConnectionStrings__HangfireConnection=Server=feedback-db;Database=FeedbackDB_Hangfire;User ID=${DB_USER};Password=${DB_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=true
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - DefaultAdminPassword=${DEFAULT_ADMIN_PASSWORD}
    volumes:
      - aspnet_keys:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      feedback-db:
        condition: service_healthy
    networks:
      - feedback_network
      - traefik-proxy

networks:
  feedback_network:
  traefik-proxy:
    external: true

volumes:
  feedback-db_data:
  redis_data:
  aspnet_keys:
